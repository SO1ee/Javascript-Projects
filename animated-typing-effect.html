<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>animated-typing-effect</title>
	<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

	<style>
		body{
			 background-color: #0d1137;
		}
		h1{
			color: white;
			position: absolute;
			top: 20rem;
			left: 36rem;
		}
		#typing{
			color:deeppink;
		}
	</style>
</head>
<body>
	<h1>Hii!! I am  <span id="typing"></span></h1>
	<script>
		var typed = new Typed('#typing', {
  			strings: ["Soma","Web Developer.", "Learning Javascript.","Interested in Backend Development."],
  			typeSpeed: 60,
  			backspeed: 20,
  			loop: true,
		});

	</script>

</body>
</html>
